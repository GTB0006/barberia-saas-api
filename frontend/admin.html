<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Blessed Barbershop</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .gold-text { color: #c5a059; text-transform: uppercase; letter-spacing: 2px; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #111; }
        th, td { padding: 12px; border: 1px solid #333; text-align: left; font-size: 0.9rem; }
        th { background: #c5a059; color: #000; }
        .btn-refresh { background: #c5a059; padding: 10px 20px; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1 class="gold-text">Panel de Control - Reservas</h1>
    <button class="btn-refresh" onclick="cargarReservas()">🔄 ACTUALIZAR LISTA</button>

    <table>
        <thead>
            <tr>
                <th>CLIENTE</th>
                <th>TELÉFONO</th>
                <th>SERVICIO</th>
                <th>BARBERO</th>
                <th>FECHA / HORA</th>
            </tr>
        </thead>
        <tbody id="lista-reservas">
            </tbody>
    </table>

    <script>
        async function cargarReservas() {
            const tabla = document.getElementById('lista-reservas');
            tabla.innerHTML = "<tr><td colspan='5'>Cargando reservas...</td></tr>";
            
            try {
                const response = await fetch('/reservas/1');
                const data = await response.json();
                
                tabla.innerHTML = "";
                data.forEach(reserva => {
                    tabla.innerHTML += `
                        <tr>
                            <td>${reserva.cliente}</td>
                            <td><a href="https://wa.me/${reserva.telefono}" style="color: #25d366; text-decoration: none;" target="_blank">WhatsApp: ${reserva.telefono}</a></td>
                            <td>${reserva.servicio}</td>
                            <td>${reserva.barbero}</td>
                            <td>${reserva.fecha} a las <b>${reserva.hora}</b></td>
                        </tr>
                    `;
                });
            } catch (error) {
                tabla.innerHTML = "<tr><td colspan='5' style='color:red;'>Error al conectar con la base de datos</td></tr>";
            }
        }
        
        window.onload = cargarReservas;
    </script>
</body>
</html>
