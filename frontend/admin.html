<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin - Blessed Barbershop</title>

    <link rel="stylesheet" href="/frontend/style.css">

</head>

<body class="admin-body" style="padding: 20px;">

    <h1 class="gold-text" style="text-align: center;">Gestión de Citas</h1>

    

    <div class="card-dark" style="display: flex; gap: 15px; align-items: center; justify-content: center; flex-wrap: wrap;">

        <span id="count-text" style="background: var(--gold); color: #000; padding: 8px 15px; border-radius: 20px; font-weight: bold;">Calculando...</span>

        

        <input type="date" id="filtro-fecha" onchange="filtrarTabla()">

        

        <select id="filtro-barbero" onchange="filtrarTabla()" style="padding: 10px; border-radius: 8px; background: #222; color: #fff; border: 1px solid #444;">

            <option value="">Todos los Barberos</option>

            <option value="Juan Camilo">Juan Camilo</option>

            <option value="Juan Sebastian">Juan Sebastian</option>

        </select>



        <button onclick="limpiarFiltro()" class="btn-volver" style="margin-bottom: 0;">Limpiar</button>

    </div>



    <div id="status" style="text-align: center; color: var(--gold);">Validando acceso...</div>



    <div style="overflow-x: auto;">

        <table id="tabla-admin" style="display: none;">

            <thead>

                <tr>

                    <th>ESTADO</th>

                    <th>CLIENTE</th>

                    <th>SERVICIO</th>

                    <th>BARBERO</th>

                    <th>FECHA</th>

                    <th>HORA</th>

                    <th>WHATSAPP</th>

                </tr>

            </thead>

            <tbody id="lista-reservas"></tbody>

        </table>

    </div>
