<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Blessed Barbershop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #000; color: #fff; padding: 20px; font-family: sans-serif;">
    <h1 class="gold-text" style="text-align: center;">Gestión de Citas</h1>
    
    <div style="background: #1a1a1a; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 15px; align-items: center; justify-content: center; flex-wrap: wrap;">
        <span id="count-text" style="background: #c5a059; color: #000; padding: 8px 15px; border-radius: 20px; font-weight: bold;">Calculando...</span>
        
        <input type="date" id="filtro-fecha" onchange="filtrarTabla()" style="padding: 10px; border-radius: 5px;">
        
        <select id="filtro-barbero" onchange="filtrarTabla()" style="padding: 10px; border-radius: 5px;">
            <option value="">Todos los Barberos</option>
            <option value="Juan Camilo">Juan Camilo</option>
            <option value="Juan Sebastian">Juan Sebastian</option>
        </select>

        <button onclick="limpiarFiltro()" style="padding: 10px; background: #333; color: #fff; border: none; border-radius: 5px; cursor: pointer;">Limpiar</button>
    </div>

    <div id="status" style="text-align: center;">Validando acceso...</div>

    <table id="tabla-admin" style="display: none;">
        <thead>
            <tr>
                <th>ESTADO</th>
                <th>CLIENTE</th>
                <th>SERVICIO</th>
                <th>BARBERO</th>
                <th>FECHA</th>
                <th>HORA</th>
                <th>WHATSAPP</th>
            </tr>
        </thead>
        <tbody id="lista-reservas"></tbody>
    </table>

    <script>
        let password = "";
        let todasLasReservas = [];

        async function validar() {
            password = prompt("Clave de Admin:");
            if(password === "Blessed2026") {
                document.getElementById('status').style.display = 'none';
                document.getElementById('tabla-admin').style.display = 'table';
                await cargarDatos();
            } else {
                alert("Incorrecto");
                window.location.reload();
            }
        }

        async function cargarDatos() {
            try {
                const res = await fetch(`/reservas/1?token=${password}`);
                todasLasReservas = await res.json();
                renderizarTabla(todasLasReservas);
            } catch(e) { alert("Error al cargar"); }
        }

        function renderizarTabla(lista) {
            const tbody = document.getElementById('lista-reservas');
            const countText = document.getElementById('count-text');
            const ahora = new Date();
            const fechaHoy = ahora.toISOString().split('T')[0];
            const horaActualNum = ahora.getHours() * 100 + ahora.getMinutes();
            let pendientesHoy = 0;

            tbody.innerHTML = lista.map(r => {
                const [h, m] = r.hora.split(':').map(Number);
                const horaReservaNum = h * 100 + m;
                let estaPasada = (r.fecha < fechaHoy || (r.fecha === fechaHoy && horaReservaNum < horaActualNum));

                if (r.fecha === fechaHoy && !estaPasada) pendientesHoy++;

                const estiloFila = estaPasada ? 'style="color: #666; opacity: 0.6;"' : '';
                return `
                <tr ${estiloFila}>
                    <td>${estaPasada ? '✅' : '⏳'}</td>
                    <td>${r.cliente}</td>
                    <td>${r.servicio}</td>
                    <td>${r.barbero}</td>
                    <td>${r.fecha}</td>
                    <td><b>${r.hora}</b></td>
                    <td><a href="https://wa.me/${r.telefono}" target="_blank" style="color:${estaPasada ? '#444' : '#25d366'}; text-decoration:none;">${estaPasada ? 'Finalizada' : 'WhatsApp'}</a></td>
                </tr>`;
            }).join('');

            countText.innerText = `Citas pendientes hoy: ${pendientesHoy}`;
        }

        function filtrarTabla() {
            const f = document.getElementById('filtro-fecha').value;
            const b = document.getElementById('filtro-barbero').value;
            let filtradas = todasLasReservas;
            if (f) filtradas = filtradas.filter(r => r.fecha === f);
            if (b) filtradas = filtradas.filter(r => r.barbero === b);
            renderizarTabla(filtradas);
        }

        function limpiarFiltro() {
            document.getElementById('filtro-fecha').value = "";
            document.getElementById('filtro-barbero').value = "";
            renderizarTabla(todasLasReservas);
        }

        window.onload = validar;
    </script>
