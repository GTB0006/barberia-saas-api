<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blessed Barbershop - Reservas</title>
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="gold-text">Blessed Barbershop</h1>
            <p>Elegancia y Estilo en cada corte</p>
        </header>

        <div id="contenedor-servicios" class="card-dark">
            <h3 class="gold-text">Servicios</h3>
            <div class="servicio-item" onclick="seleccionarServicio('Corte Moderno', '35.000')">
                <div class="servicio-info"><span>Corte Moderno</span><span>40 min</span></div>
                <span class="precio">35.000 COP</span>
            </div>
            <div class="servicio-item" onclick="seleccionarServicio('Corte y Barba', '50.000')">
                <div class="servicio-info"><span>Corte y Barba</span><span>1 h</span></div>
                <span class="precio">50.000 COP</span>
            </div>
            </div>

        <div id="formulario-datos" class="card-dark" style="display: none;">
            <button class="btn-volver" onclick="volverAServicios()">⬅ Volver</button>
            <h2 id="resumen-servicio" class="gold-text" style="text-align:center;"></h2>
            
            <label>Elige tu Barbero:</label>
            <div id="contenedor-barberos-fotos" class="barberos-grid"></div>

            <div class="form-group"><label>Nombre:</label><input type="text" id="cliente_nombre"></div>
            <div class="form-group"><label>WhatsApp:</label><input type="tel" id="cliente_telefono"></div>
            <div class="form-group"><label>Email:</label><input type="email" id="cliente_email"></div>
            <div class="form-group"><label>Fecha:</label><input type="date" id="fecha"></div>
            <div class="form-group"><label>Hora:</label><input type="time" id="hora"></div>

            <button class="btn-agendar" onclick="agendarCita()">RESERVAR AHORA</button>
        </div>

        <div class="card-dark info-ubicacion">
            <h3 class="gold-text">📍 Ubicación</h3>
            <a href="https://www.google.com/maps/search/?api=1&query=Calle+38+Sur+34-22+Envigado" target="_blank">
                <p>Cl. 38 Sur #34-22, Envigado, Antioquia</p>
            </a>
            <div class="mapa-frame">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3966.5!2d-75.58!3d6.17" width="100%" height="200" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </div>
    </div>
    <script src="/frontend/script.js"></script>
</body>
</html>
