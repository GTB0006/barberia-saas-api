<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barbería 💈 | Reserva</title>

<style>
* {
    box-sizing: border-box;
    font-family: 'Segoe UI', Arial, sans-serif;
}

body {
    background-color: #111827; 
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.app {
    width: 100%;
    max-width: 420px;
    padding: 20px;
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(10px);
}

@media (min-width: 768px) {
    .app {
        border-radius: 18px;
        box-shadow: 0 20px 50px rgba(0,0,0,.5);
    }
}

h1 { text-align: center; margin-bottom: 5px; color: #111827; }
.subtitle { text-align: center; color: #6b7280; font-size: 14px; margin-bottom: 20px; }
label { font-size: 13px; font-weight: 600; margin-top: 12px; display: block; }
input, select { width: 100%; padding: 14px; margin-top: 6px; border-radius: 10px; border: 1px solid #d1d5db; font-size: 15px; }
button { margin-top: 25px; width: 100%; padding: 15px; background: #111827; color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
button:hover { background: #374151; }

.msg { margin-top: 15px; padding: 12px; border-radius: 10px; font-size: 14px; text-align: center; }
.ok { background: #dcfce7; color: #166534; }
.error { background: #fee2e2; color: #7f1d1d; }

.reserva { background: #f3f4f6; border-radius: 10px; padding: 12px; margin-bottom: 10px; font-size: 14px; border-left: 4px solid #111827; }

.prof-preview { text-align: center; margin-top: 15px; min-height: 100px; }
.prof-preview img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #111827; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
</style>
</head>

<body>

<div class="app">
    <h1>💈 Blessed Barbershop</h1>
    <div class="subtitle">📍 Calle 38 sur 34-22 Envigado</div>

    <label>Nombre Completo</label>
    <input id="nombre" placeholder="Ej: Juan Pérez">

    <label>Teléfono (Opcional)</label>
    <input id="telefono" placeholder="Ej: 3001234567">

    <label>Cédula (Opcional)</label>
    <input id="cedula" placeholder="Documento de identidad">

    <label>Correo Electrónico</label>
    <input id="correo" type="email" placeholder="tu@correo.com">

    <label>Selecciona tu Barbero</label>
    <select id="profesional" onchange="mostrarImagenProfesional()">
        <option value="">Cargando profesionales...</option>
    </select>

    <div class="prof-preview" id="preview"></div>

    <label>Fecha de la Cita</label>
    <input type="date" id="fecha">

    <label>Hora</label>
    <input type="time" id="hora">

    <button onclick="reservar()">Agendar Cita Ahora</button>

    <div id="mensaje"></div>

    <hr style="margin: 25px 0; border: 0; border-top: 1px solid #e5e7eb;">

    <h3>📅 Tus Próximas Reservas</h3>
    <div id="lista"></div>
</div>

<script>
const API = window.location.origin;
const URL_FONDO = "https://ntfqlkuhzoqvjtkfyvkr.supabase.co/storage/v1/object/public/barberos/fondo.jpeg";
let profesionales = {};

// Fondo
document.body.style.background = `linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('${URL_FONDO}') no-repeat center center fixed`;
document.body.style.backgroundSize = "cover";

// Bloquear fechas pasadas
document.getElementById("fecha").min = new Date().toISOString().split("T")[0];

function mostrarImagenProfesional() {
    const id = document.getElementById("profesional").value;
    const preview = document.getElementById("preview");
    if (profesionales[id] && profesionales[id].foto_url) {
        preview.innerHTML = `<img src="${profesionales[id].foto_url}" alt="Barbero">`;
    } else {
        preview.innerHTML = "";
    }
}

async function cargarProfesionales() {
    try {
        const res = await fetch(`${API}/barberos/1`); 
        if (!res.ok) throw new Error("Fallo al conectar con el servidor");
        const data = await res.json();
        const select = document.getElementById("profesional");

        if (data.length === 0) {
            select.innerHTML = '<option value="">No hay barberos disponibles</option>';
            return;
        }

        select.innerHTML = '<option value="">Selecciona un profesional</option>';
        data.forEach(p => {
            profesionales[p.id] = p;
            const opt = document.createElement("option");
            opt.value = p.id;
            opt.textContent = p.nombre;
            select.appendChild(opt);
        });
    } catch (e) {
        document.getElementById("profesional").innerHTML = '<option value="">Error al cargar</option>';
    }
}

async function reservar() {
    const nombre = document.getElementById("nombre").value;
    const correo = document.getElementById("correo").value;
    const profesional_id = document.getElementById("profesional").value;
    const fecha = document.getElementById("fecha").value;
    const hora = document.getElementById("hora").value;

    const msg = document.getElementById("mensaje");
    
    if (!nombre || !correo || !profesional_id || !fecha || !hora) {
        msg.className = "msg error";
        msg.innerText = "Por favor completa los campos obligatorios";
        return;
    }

    msg.innerHTML = "Procesando...";
    msg.className = "msg";

    try {
        // Enviar todo directamente a /reservas según el nuevo main.py
        const params = new URLSearchParams({
            barberia_id: 1,
            barbero_id: profesional_id,
            cliente_nombre: nombre,
            cliente_email: correo,
            fecha: fecha,
            hora: hora
        });

        const res = await fetch(`${API}/reservas?${params}`, { method: "POST" });
        const data = await res.json();

        if (!res.ok) throw new Error(data.detail || "Error al reservar");

        msg.className = "msg ok";
        msg.innerText = "¡Reserva confirmada! Revisa tu correo.";
        
        // Limpiar campos
        document.getElementById("nombre").value = "";
        document.getElementById("correo").value = "";
        
        cargarReservas();

    } catch (e) {
        msg.className = "msg error";
        msg.innerText = e.message;
    }
}

async function cargarReservas() {
    try {
        const res = await fetch(`${API}/reservas/1`);
        if (!res.ok) return;
        const data = await res.json();
        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        data.forEach(r => {
            lista.innerHTML += `
                <div class="reserva">
                    <strong>👤 ${r.cliente}</strong><br>
                    ✂️ Barbero: ${r.profesional}<br>
                    📅 ${r.fecha} | ⏰ ${r.hora}
                </div>
            `;
        });
    } catch (e) {
        console.log("Error cargando reservas");
    }
}

cargarProfesionales();
cargarReservas();
</script>
</body>
</html>
